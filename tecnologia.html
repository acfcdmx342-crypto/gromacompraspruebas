<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Tecnología - Procomex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <script type="text/javascript">
        (function(){ emailjs.init("0aHlArLgvHrj2Xbk8"); })();
    </script>
    <style>
        body { background:#f2f4f7; transition: background 0.3s ease; }
        .card { border-radius:20px; border: none; transition: background 0.3s ease; }
        .action-btn { cursor:pointer; font-size:22px; transition: 0.2s; display: inline-block; padding: 0 4px; }
        .action-btn:hover { transform: scale(1.2); }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; justify-content:center; align-items:center; flex-direction:column; }
        .form-label { font-weight: 600; color: #495057; }
        .form-control { border-radius: 10px; padding: 10px; }
        #preview-container { border: 2px dashed #ccc; border-radius: 10px; min-height: 100px; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #fff; margin-top: 10px; }
        #preview-container img, #preview-container iframe { width: 100%; height: 150px; object-fit: contain; }
        body.dark-mode { background: #1a1d21; color: #e9ecef; }
        body.dark-mode .card, body.dark-mode .navbar { background: #24282d; color: #fff; border: 1px solid #383f45; }
        body.dark-mode .table { color: #fff; }
    </style>
</head>
<body class="p-3">

<div id="loader">
    <img src="https://gruporoma.com/wp-content/uploads/2023/06/cropped-cropped-procomex-pachuca-logo-350-%C3%97-100-px-1.png" style="width:200px;">
    <div class="spinner-border text-primary mt-3"></div>
    <p class="mt-2 fw-bold text-primary">Procesando solicitud...</p>
</div>

<nav class="navbar navbar-expand-lg card shadow-sm mb-4 px-3">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold text-primary"><i class="fa-solid fa-microchip me-2"></i>TECNOLOGÍA</span>
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-light shadow-sm" onclick="toggleDarkMode()"><i class="fa-solid fa-moon"></i></button>
            <div id="userDisplay" class="fw-bold text-secondary px-3 py-1 bg-white rounded-pill shadow-sm">Usuario</div>
            <button class="btn btn-danger btn-sm rounded-pill" onclick="cerrarSesion()">Salir</button>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow p-4">
                <h5 class="fw-bold mb-4 text-secondary"><i class="fa-solid fa-plus-circle me-2"></i>Nueva Solicitud</h5>
                <form id="formTec">
                    <div class="mb-3">
                        <label class="form-label">EMPRESA</label>
                        <input type="text" id="empresa" class="form-control text-uppercase" placeholder="PROCOMEX" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">ZONA / SUCURSAL</label>
                        <div class="row g-2">
                            <div class="col-6"><input type="text" id="zona" class="form-control text-uppercase" placeholder="ZONA" required></div>
                            <div class="col-6"><input type="text" id="sucursal" class="form-control text-uppercase" placeholder="SUCURSAL" required></div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">SOPORTE</label>
                        <input type="text" id="soporte" class="form-control" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">REQUISICIÓN (PDF/IMG)</label>
                        <input type="file" id="archivo" class="form-control" accept="image/*,.pdf" onchange="previewArchivo(this)" required>
                        <div class="mt-2 d-flex gap-2 flex-wrap">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="checkLocal">
                                <label class="form-check-label small fw-bold">Local</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="colorCenter">
                                <label class="form-check-label text-primary fw-bold small">Color Center</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="urgente">
                                <label class="form-check-label text-danger fw-bold small">Urgente</label>
                            </div>
                        </div>
                    </div>
                    <div id="preview-container">Vista previa</div>
                    <button type="button" class="btn btn-primary w-100 py-3 fw-bold shadow mt-3" onclick="guardarSolicitud()">💾 REGISTRAR</button>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card shadow p-4">
                <h5 class="fw-bold mb-4 text-secondary"><i class="fa-solid fa-list-check me-2"></i>Solicitudes en Proceso</h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center">
                        <thead class="table-light">
                            <tr>
                                <th>FOLIO</th><th>SUCURSAL</th><th>TIPO</th><th>ESTATUS</th><th>ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody id="tablaTecBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { database, ref, push, onValue, get, remove, update } from "./firebase.js";

    // Manejo de Sesión
    const sesion = JSON.parse(localStorage.getItem("usuarioLogueado"));
    if(!sesion) location.href = "index.html";
    document.getElementById("userDisplay").textContent = sesion.nombre;
    document.getElementById("soporte").value = sesion.nombre;
    window.nombreSesion = sesion.nombre;

    const solicitudesRef = ref(database, "tecnologia");

    // Función Guardar
    window.guardarSolicitud = async () => {
        const emp = document.getElementById("empresa").value;
        const zon = document.getElementById("zona").value;
        const suc = document.getElementById("sucursal").value;
        const fileInput = document.getElementById("archivo").files[0];
        const isLocal = document.getElementById("checkLocal").checked;
        const isColorCenter = document.getElementById("colorCenter").checked;

        if(!emp || !zon || !suc || !fileInput) {
            return Swal.fire("Atención", "Por favor completa los campos y sube un archivo", "warning");
        }

        document.getElementById("loader").style.display = "flex";

        const reader = new FileReader();
        reader.onload = async () => {
            try {
                const snap = await get(solicitudesRef);
                const num = snap.exists() ? Object.keys(snap.val()).length + 1 : 1;
                const fol = `TEC-${emp.substring(0,3)}-${zon.substring(0,3)}-${num.toString().padStart(4,'0')}`.toUpperCase();

                let tipoFinal = "COMPRAS";
                if(isColorCenter) tipoFinal = "COLOR CENTER";
                else if(isLocal) tipoFinal = "LOCAL";

                await push(solicitudesRef, {
                    folio: fol,
                    empresa: emp.toUpperCase(),
                    zona: zon.toUpperCase(),
                    sucursal: suc.toUpperCase(),
                    soporte: window.nombreSesion,
                    archivoData: reader.result,
                    tipo: tipoFinal,
                    urgente: document.getElementById("urgente").checked,
                    status: (isLocal || isColorCenter) ? "EN COTIZACION" : "PENDIENTE",
                    fechaISO: new Date().toISOString(),
                    eliminado: false
                });

                document.getElementById("formTec").reset();
                document.getElementById("preview-container").innerHTML = "Vista previa";
                document.getElementById("loader").style.display = "none";
                Swal.fire("Éxito", "Solicitud guardada con folio: " + fol, "success");
            } catch (e) {
                console.error(e);
                document.getElementById("loader").style.display = "none";
                Swal.fire("Error", "No se pudo guardar en la base de datos", "error");
            }
        };
        reader.readAsDataURL(fileInput);
    };

    // Escuchar cambios en la tabla
    onValue(solicitudesRef, (snapshot) => {
        const tbody = document.getElementById("tablaTecBody");
        tbody.innerHTML = "";
        snapshot.forEach(child => {
            const s = child.val();
            if (s.eliminado) return;

            const badgeColor = s.tipo === 'COLOR CENTER' ? 'bg-primary' : (s.tipo === 'LOCAL' ? 'bg-warning text-dark' : 'bg-secondary');
            
            const tr = document.createElement("tr");
            if(s.urgente) tr.classList.add("table-warning");
            
            tr.innerHTML = `
                <td class="fw-bold">${s.folio}</td>
                <td>${s.sucursal}</td>
                <td><span class="badge ${badgeColor}">${s.tipo}</span></td>
                <td><span class="badge bg-danger">${s.status}</span></td>
                <td>
                    <i class="fa-solid fa-eye text-info action-btn" onclick="verPDF('${s.archivoData}')"></i>
                    <i class="fa-solid fa-trash text-danger action-btn" onclick="eliminar('${child.key}')"></i>
                </td>
            `;
            tbody.appendChild(tr);
        });
    });

    // Vista previa de archivo
    window.previewArchivo = (input) => {
        const container = document.getElementById("preview-container");
        if(!input.files[0]) return container.innerHTML = "Vista previa";
        const reader = new FileReader();
        reader.onload = e => {
            container.innerHTML = input.files[0].type.includes("pdf") 
                ? `<iframe src="${e.target.result}" style="width:100%;height:150px;border:none;"></iframe>` 
                : `<img src="${e.target.result}">`;
        };
        reader.readAsDataURL(input.files[0]);
    };

    window.verPDF = (base64) => {
        Swal.fire({
            title: 'Requisición adjunta',
            html: `<iframe src="${base64}" style="width:100%; height:450px; border:none;"></iframe>`,
            width: '850px',
            confirmButtonText: 'Cerrar'
        });
    };

    window.eliminar = async (key) => {
        const res = await Swal.fire({
            title: '¿Estás seguro?',
            text: "Esta acción no se puede deshacer",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            confirmButtonText: 'Sí, eliminar'
        });
        if(res.isConfirmed) await remove(ref(database, "tecnologia/" + key));
    };

    window.toggleDarkMode = () => {
        document.body.classList.toggle('dark-mode');
    };

    window.cerrarSesion = () => { localStorage.clear(); location.href = "index.html"; };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
