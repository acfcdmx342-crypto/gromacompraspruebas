<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitud de Tecnología</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body { background:#f2f4f7; }
.card { border-radius:15px; }
.fila-local { background:#fff3cd; }
</style>
</head>

<body class="p-4">

<div class="container">

<!-- ================= FORMULARIO ================= -->
<div class="card p-4 mb-4 shadow">
<h5 class="mb-3">Nueva Solicitud</h5>

<form id="formTec" class="row g-3">

<div class="col-md-3">
<label>Empresa</label>
<input id="empresa" class="form-control">
</div>

<div class="col-md-3">
<label>Zona</label>
<input id="zona" class="form-control">
</div>

<div class="col-md-3">
<label>Sucursal</label>
<input id="sucursal" class="form-control">
</div>

<div class="col-md-6">
<label>Archivo</label>

<div class="input-group">
<input id="archivo" type="file" class="form-control">

<div class="input-group-text">

<input type="checkbox" id="checkLocal">
<label class="ms-2 me-3">Local</label>

<input type="checkbox" id="checkColorCenter">
<label class="ms-2">Color Center</label>

</div>
</div>

</div>

<div class="col-12 text-center">
<button type="button" class="btn btn-primary" onclick="guardarSolicitud()">Guardar</button>
</div>

</form>
</div>

<!-- ================= TABLA ================= -->
<div class="card p-4 shadow">
<h5>Solicitudes</h5>

<table class="table table-bordered text-center mt-3">
<thead class="table-primary">
<tr>
<th>Folio</th>
<th>Empresa</th>
<th>Zona</th>
<th>Sucursal</th>
<th>Tipo</th>
</tr>
</thead>

<tbody id="tablaTecBody"></tbody>

</table>
</div>

</div>

<script>

let data = [];

// ================= GUARDAR =================
function guardarSolicitud(){

const emp = document.getElementById("empresa").value;
const zon = document.getElementById("zona").value;
const suc = document.getElementById("sucursal").value;
const arc = document.getElementById("archivo").files[0];

const local = document.getElementById("checkLocal").checked;
const colorCenter = document.getElementById("checkColorCenter").checked;

// MISMA LOGICA
const esLocal = local || colorCenter;

if(!emp || !zon || !suc || !arc){
Swal.fire("Error","Completa todos los campos","error");
return;
}

const folio = "TEC-" + Math.floor(Math.random()*10000);

// GUARDAR
data.push({
folio,
empresa: emp.toUpperCase(),
zona: zon.toUpperCase(),
sucursal: suc.toUpperCase(),

solicitudLocal: esLocal,
isLocal: esLocal,
colorCenter: colorCenter,

status: esLocal ? "EN COTIZACION" : "PENDIENTE"
});

document.getElementById("formTec").reset();

renderTabla();

Swal.fire("Éxito","Solicitud guardada","success");

}

// ================= TABLA =================
function renderTabla(){

const tbody = document.getElementById("tablaTecBody");
tbody.innerHTML = "";

data.forEach(s => {

const esLocal = s.solicitudLocal === true || s.isLocal === true;
const esColor = s.colorCenter === true;

let tipo = "COMPRAS";
let clase = "bg-secondary";

if(esColor){
tipo = "COLOR CENTER";
clase = "bg-info";
}else if(esLocal){
tipo = "LOCAL";
clase = "bg-warning text-dark";
}

const tr = document.createElement("tr");

if(esLocal) tr.classList.add("fila-local");

tr.innerHTML = `
<td>${s.folio}</td>
<td>${s.empresa}</td>
<td>${s.zona}</td>
<td>${s.sucursal}</td>
<td><span class="badge ${clase}">${tipo}</span></td>
`;

tbody.appendChild(tr);

});

}

</script>

</body>
</html>
