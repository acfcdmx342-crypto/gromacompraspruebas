<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Mantenimiento</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0; /* Un color de fondo suave */
        }
        img {
            max-width: 90%; /* La imagen no ocupará más del 90% del ancho de la pantalla */
            height: auto; /* Mantiene la proporción de la imagen */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Sutil sombra para realzar la imagen */
            border-radius: 8px; /* Bordes ligeramente redondeados */
        }
    </style>
</head>
<body>
    <img src="https://drive.google.com/file/d/1mSTicR8FxjiTzKqEjBIM7y7QnZSyVz6Z/view?usp=sharing" alt="Página en Mantenimiento">
</body>
</html>
