Simulación frontend (sin backend)

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Soporte</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<div class="d-flex">

    <!-- MENÚ IZQUIERDO -->
    <div class="bg-dark text-white p-3" style="width:260px; min-height:100vh;">
        <h6>CATÁLOGOS</h6>

        <a href="#" class="text-white d-block mb-2" onclick="cargar('seguimiento')">Seguimiento</a>
        <a href="#" class="text-white d-block mb-2" onclick="cargar('stock')">Stock / Resguardo</a>
        <a href="#" class="text-white d-block" onclick="cargar('cctv')">Suc CCTV</a>
    </div>

    <!-- CONTENIDO -->
    <div class="flex-grow-1 p-4">
        <h3>Bienvenido al Sistema</h3>
        <div id="contenido"></div>
    </div>

    </div>

<script>

let rol = "admin"; // cambiar a "jr" para simular restricción

function cargar(modulo){

    if(modulo === 'seguimiento'){
        $('#contenido').html(`
            <div class="card p-4">
                <h4>Seguimiento</h4>
                <p>Aquí se integra tu sistema existente.</p>
            </div>
        `);
    }

    if(modulo === 'stock'){
        $('#contenido').html(`
            <div class="card p-4">
                <h4>Stock / Resguardo</h4>

                <form id="formStock" class="row g-2 mb-3">
                    <div class="col"><input class="form-control" placeholder="Artículo" id="articulo"></div>
                    <div class="col"><input class="form-control" placeholder="Marca" id="marca"></div>
                    <div class="col"><input class="form-control" placeholder="Modelo" id="modelo"></div>
                    <div class="col"><input class="form-control" placeholder="Costo" id="costo"></div>
                    <div class="col"><input class="form-control" placeholder="Estado" id="estado"></div>
                    <div class="col"><button class="btn btn-primary">Guardar</button></div>
                </form>

                <table class="table table-bordered" id="tablaStock">
                    <thead>
                        <tr>
                            <th>Artículo</th>
                            <th>Marca</th>
                            <th>Modelo</th>
                            <th>Costo</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        `);

        $('#formStock').submit(function(e){
            e.preventDefault();

            let fila = `
                <tr>
                    <td>${$('#articulo').val()}</td>
                    <td>${$('#marca').val()}</td>
                    <td>${$('#modelo').val()}</td>
                    <td>${$('#costo').val()}</td>
                    <td>${$('#estado').val()}</td>
                </tr>
            `;

            $('#tablaStock tbody').append(fila);
            this.reset();
        });
    }

    if(modulo === 'cctv'){
        $('#contenido').html(`
            <div class="card p-4">
                <h4>Suc CCTV</h4>

                <form id="formCCTV" class="row g-2 mb-3">
                    <div class="col"><input class="form-control" placeholder="Negocio" id="negocio"></div>
                    <div class="col"><input class="form-control" placeholder="Zona" id="zona"></div>
                    <div class="col"><input class="form-control" placeholder="Sucursal" id="sucursal"></div>
                    <div class="col"><input class="form-control" placeholder="Serie" id="serie"></div>
                    <div class="col"><button class="btn btn-primary">Guardar</button></div>
                </form>

                <table class="table table-bordered" id="tablaCCTV">
                    <thead>
                        <tr>
                            <th>Negocio</th>
                            <th>Zona</th>
                            <th>Sucursal</th>
                            <th>Serie</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        `);

        $('#formCCTV').submit(function(e){
            e.preventDefault();

            let fila = `
                <tr>
                    <td>${$('#negocio').val()}</td>
                    <td>${$('#zona').val()}</td>
                    <td>${$('#sucursal').val()}</td>
                    <td>${$('#serie').val()}</td>
                </tr>
            `;

            $('#tablaCCTV tbody').append(fila);
            this.reset();
        });
    }
}

</script>

</body>
</html>
