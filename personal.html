<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Soporte</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVPisdfwemquRfbszsIZRkHz72bCeUCNE",
  authDomain: "stock-f43d4.firebaseapp.com",
  projectId: "stock-f43d4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.deleteDoc = deleteDoc;
window.doc = doc;
window.updateDoc = updateDoc;
</script>
</head>
<body>

<div class="d-flex">

<!-- MENÚ -->
<div class="bg-dark text-white p-3" style="width:260px; min-height:100vh;">
    <h6>CATÁLOGOS</h6>
    <a href="#" onclick="cargar('tecnologia.html')" class="text-white d-block mb-2">SEGUIMIENTO</a>
    <a href="#" class="text-white d-block mb-2" onclick="cargar('stock')">STOCK / RESGUARDO</a>
    <a href="#" class="text-white d-block" onclick="cargar('cctv')">SUCURSALES CCTV</a>
</div>

<!-- CONTENIDO -->
<div class="flex-grow-1 p-4">
    <h3>Bienvenido</h3>
  <div><button class="btn btn-danger w-100" onclick="cerrarSesion()">
    <i class="bi bi-box-arrow-right"></i> Cerrar sesión</button></div>
    <div id="contenido"></div>
</div>

</div>

<!-- 🔥 MODAL -->
<div class="modal fade" id="modalEditar" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Editar Registro</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="contenidoModal"></div>

      <div class="modal-footer">
        <button class="btn btn-success" onclick="guardarEdicion()">Guardar</button>
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

let editId = "";
let editTipo = "";

function cargar(modulo){

    if(modulo.includes('.html')){
        $("#contenido").load(modulo);
        return;
    }

    // ================= STOCK =================
    if(modulo === 'stock'){
        $('#contenido').html(`
        <div class="card p-3">
            <h4>Stock</h4>
            <form id="formStock" class="row g-2 mb-3">
                <div class="col-md"><input class="form-control" placeholder="Artículo" id="articulo"></div>
                <div class="col-md"><input class="form-control" placeholder="Marca" id="marca"></div>
                <div class="col-md"><input class="form-control" placeholder="Modelo" id="modelo"></div>
                <div class="col-md"><input class="form-control" placeholder="Costo" id="costo"></div>
                <div class="col-md"><input class="form-control" placeholder="Estado" id="estado"></div>
                <div class="col-md"><button class="btn btn-primary w-100">Guardar</button></div>
            </form>
            <div class="table-responsive">
                <table class="table table-bordered" id="tablaStock">
                    <thead>
                        <tr>
                            <th>Artículo</th>
                            <th>Marca</th>
                            <th>Modelo</th>
                            <th>Costo</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        `);

        cargarStock();

        $('#formStock').submit(async function(e){
            e.preventDefault();

            await addDoc(collection(db, "stock"), {
                articulo: $('#articulo').val(),
                marca: $('#marca').val(),
                modelo: $('#modelo').val(),
                costo: $('#costo').val(),
                estado: $('#estado').val()
            });

            this.reset();
            cargarStock();
        });
    }

    // ================= CCTV =================
    if(modulo === 'cctv'){
        $('#contenido').html(`
        <div class="card p-3">
            <h4>CCTV</h4>

            <form id="formCCTV" class="row g-2 mb-3">
                <div class="col-md"><input class="form-control" placeholder="Negocio" id="negocio"></div>
                <div class="col-md"><input class="form-control" placeholder="Zona" id="zona"></div>
                <div class="col-md"><input class="form-control" placeholder="Sucursal" id="sucursal"></div>
                <div class="col-md"><input class="form-control" placeholder="Serie" id="serie"></div>
                <div class="col-md"><button class="btn btn-primary w-100">Guardar</button></div>
            </form>

            <div class="table-responsive">
                <table class="table table-bordered" id="tablaCCTV">
                    <thead>
                        <tr>
                            <th>Negocio</th>
                            <th>Zona</th>
                            <th>Sucursal</th>
                            <th>Serie</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        `);

        cargarCCTV();

        $('#formCCTV').submit(async function(e){
            e.preventDefault();

            await addDoc(collection(db, "cctv"), {
                negocio: $('#negocio').val(),
                zona: $('#zona').val(),
                sucursal: $('#sucursal').val(),
                serie: $('#serie').val()
            });

            this.reset();
            cargarCCTV();
        });
    }
}

// ================= CARGAS =================

async function cargarStock(){
    const datos = await getDocs(collection(db, "stock"));
    let html = "";

    datos.forEach(d => {
        let data = d.data();
        html += `
        <tr>
            <td>${data.articulo}</td>
            <td>${data.marca}</td>
            <td>${data.modelo}</td>
            <td>${data.costo}</td>
            <td>${data.estado}</td>
            <td>
                <i class="bi bi-pencil-square text-primary me-2" style="cursor:pointer"
                   onclick="editarStock('${d.id}', '${data.articulo}', '${data.marca}', '${data.modelo}', '${data.costo}', '${data.estado}')"></i>

                <i class="bi bi-trash text-danger" style="cursor:pointer"
                   onclick="eliminar('stock','${d.id}',cargarStock)"></i>
            </td>
        </tr>`;
    });

    $('#tablaStock tbody').html(html);
}

async function cargarCCTV(){
    const datos = await getDocs(collection(db, "cctv"));
    let html = "";

    datos.forEach(d => {
        let data = d.data();
        html += `
        <tr>
            <td>${data.negocio}</td>
            <td>${data.zona}</td>
            <td>${data.sucursal}</td>
            <td>${data.serie}</td>
            <td>
                <i class="bi bi-pencil-square text-primary me-2" style="cursor:pointer"
                   onclick="editarCCTV('${d.id}', '${data.negocio}', '${data.zona}', '${data.sucursal}', '${data.serie}')"></i>

                <i class="bi bi-trash text-danger" style="cursor:pointer"
                   onclick="eliminar('cctv','${d.id}',cargarCCTV)"></i>
            </td>
        </tr>`;
    });

    $('#tablaCCTV tbody').html(html);
}

// ================= EDITAR =================

function editarStock(id,a,m,mo,c,e){
    editId = id;
    editTipo = "stock";

    $('#contenidoModal').html(`
        <input class="form-control mb-2" id="editArticulo" value="${a}">
        <input class="form-control mb-2" id="editMarca" value="${m}">
        <input class="form-control mb-2" id="editModelo" value="${mo}">
        <input class="form-control mb-2" id="editCosto" value="${c}">
        <input class="form-control mb-2" id="editEstado" value="${e}">
    `);

    new bootstrap.Modal(document.getElementById('modalEditar')).show();
}

function editarCCTV(id,n,z,s,se){
    editId = id;
    editTipo = "cctv";

    $('#contenidoModal').html(`
        <input class="form-control mb-2" id="editNegocio" value="${n}">
        <input class="form-control mb-2" id="editZona" value="${z}">
        <input class="form-control mb-2" id="editSucursal" value="${s}">
        <input class="form-control mb-2" id="editSerie" value="${se}">
    `);

    new bootstrap.Modal(document.getElementById('modalEditar')).show();
}

async function guardarEdicion(){

    if(editTipo === "stock"){
        await updateDoc(doc(db,"stock",editId), {
            articulo: $('#editArticulo').val(),
            marca: $('#editMarca').val(),
            modelo: $('#editModelo').val(),
            costo: $('#editCosto').val(),
            estado: $('#editEstado').val()
        });
        cargarStock();
    }

    if(editTipo === "cctv"){
        await updateDoc(doc(db,"cctv",editId), {
            negocio: $('#editNegocio').val(),
            zona: $('#editZona').val(),
            sucursal: $('#editSucursal').val(),
            serie: $('#editSerie').val()
        });
        cargarCCTV();
    }

    bootstrap.Modal.getInstance(document.getElementById('modalEditar')).hide();
}

// ================= ELIMINAR =================

async function eliminar(col,id,recargar){
    if(confirm("¿Eliminar registro?")){
        await deleteDoc(doc(db,col,id));
        recargar();
    }
}
// ================= CERRARSESION =================
function cerrarSesion(){
    if(confirm("¿Cerrar sesión?")){
        
        // 🔥 Si usas almacenamiento local (opcional)
        localStorage.clear();
        sessionStorage.clear();

        // 🔄 Redirige al login o index
        window.location.href = "index.html";
    }
}
  
</script>

</body>
</html>
