<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Soporte</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVPisdfwemquRfbszsIZRkHz72bCeUCNE",
  authDomain: "stock-f43d4.firebaseapp.com",
  projectId: "stock-f43d4",
  storageBucket: "stock-f43d4.firebasestorage.app",
  messagingSenderId: "417599448643",
  appId: "1:417599448643:web:6374a5c6545a4459d456f6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👉 hacer global
window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
</script>

</head>

<body>

<div class="d-flex">

    <!-- MENÚ IZQUIERDO -->
    <div class="bg-dark text-white p-3" style="width:260px; min-height:100vh;">
        <h6>CATÁLOGOS</h6>

        <a href="#" onclick="cargar('tecnologia.html')" class="text-white d-block mb-2">
            SEGUIMIENTO
        </a>

        <a href="#" class="text-white d-block mb-2" onclick="cargar('stock')">
            STOCK / RESGUARDO
        </a>

        <a href="#" class="text-white d-block" onclick="cargar('cctv')">
            SUCURSALES CCTV
        </a>
    </div>

    <!-- CONTENIDO -->
    <div class="flex-grow-1 p-4">
        <h3>Bienvenido al Sistema</h3>
        <div id="contenido"></div>
    </div>

</div>

<script>

function cargar(modulo){

    if(modulo.includes('.html')){
        $("#contenido").load(modulo);
        return;
    }

    // =========================
    // STOCK
    // =========================
    if(modulo === 'stock'){
        $('#contenido').html(`
            <div class="card p-4">
                <h4>Stock / Resguardo</h4>

                <form id="formStock" class="row g-2 mb-3">
                    <div class="col"><input class="form-control" placeholder="Artículo" id="articulo"></div>
                    <div class="col"><input class="form-control" placeholder="Marca" id="marca"></div>
                    <div class="col"><input class="form-control" placeholder="Modelo" id="modelo"></div>
                    <div class="col"><input class="form-control" placeholder="Costo" id="costo"></div>
                    <div class="col"><input class="form-control" placeholder="Estado" id="estado"></div>
                    <div class="col"><button class="btn btn-primary">Guardar</button></div>
                </form>

                <table class="table table-bordered" id="tablaStock">
                    <thead>
                        <tr>
                            <th>Artículo</th>
                            <th>Marca</th>
                            <th>Modelo</th>
                            <th>Costo</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        `);

        cargarStock();

        $('#formStock').submit(async function(e){
            e.preventDefault();

            let data = {
                articulo: $('#articulo').val(),
                marca: $('#marca').val(),
                modelo: $('#modelo').val(),
                costo: $('#costo').val(),
                estado: $('#estado').val(),
                fecha: new Date()
            };

            await addDoc(collection(db, "stock"), data);

            alert("Guardado en la nube ✅");
            this.reset();
            cargarStock();
        });
    }

    // =========================
    // CCTV
    // =========================
    if(modulo === 'cctv'){
        $('#contenido').html(`
            <div class="card p-4">
                <h4>Suc CCTV</h4>

                <form id="formCCTV" class="row g-2 mb-3">
                    <div class="col"><input class="form-control" placeholder="Negocio" id="negocio"></div>
                    <div class="col"><input class="form-control" placeholder="Zona" id="zona"></div>
                    <div class="col"><input class="form-control" placeholder="Sucursal" id="sucursal"></div>
                    <div class="col"><input class="form-control" placeholder="Serie" id="serie"></div>
                    <div class="col"><button class="btn btn-primary">Guardar</button></div>
                </form>

                <table class="table table-bordered" id="tablaCCTV">
                    <thead>
                        <tr>
                            <th>Negocio</th>
                            <th>Zona</th>
                            <th>Sucursal</th>
                            <th>Serie</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        `);

        cargarCCTV();

        $('#formCCTV').submit(async function(e){
            e.preventDefault();

            await addDoc(collection(db, "cctv"), {
                negocio: $('#negocio').val(),
                zona: $('#zona').val(),
                sucursal: $('#sucursal').val(),
                serie: $('#serie').val(),
                fecha: new Date()
            });

            alert("Guardado en la nube ✅");
            this.reset();
            cargarCCTV();
        });
    }
}

// =========================
// FUNCIONES FIREBASE
// =========================

async function cargarStock(){
    const querySnapshot = await getDocs(collection(db, "stock"));
    let html = "";

    querySnapshot.forEach((doc) => {
        let d = doc.data();
        html += `
            <tr>
                <td>${d.articulo}</td>
                <td>${d.marca}</td>
                <td>${d.modelo}</td>
                <td>${d.costo}</td>
                <td>${d.estado}</td>
            </tr>
        `;
    });

    $('#tablaStock tbody').html(html);
}

async function cargarCCTV(){
    const querySnapshot = await getDocs(collection(db, "cctv"));
    let html = "";

    querySnapshot.forEach((doc) => {
        let d = doc.data();
        html += `
            <tr>
                <td>${d.negocio}</td>
                <td>${d.zona}</td>
                <td>${d.sucursal}</td>
                <td>${d.serie}</td>
            </tr>
        `;
    });

    $('#tablaCCTV tbody').html(html);
}

</script>

</body>
</html>
